name: Keep Render Awake

on:
  schedule:
    # Chạy mỗi 5 phút để giữ server Render không bị sleep
    - cron: '*/5 * * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công nếu cần

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          RENDER_URL="https://quanztrade-app.onrender.com/"
          echo "Pinging $RENDER_URL to keep it awake..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL")
          echo "Response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Ping successful!"
          else
            echo "⚠️ Ping returned status $HTTP_STATUS"
          fi
