name: Scrape The5ers

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd scraper && npm install --no-audit --no-fund 2>&1

      - name: Scrape The5ers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          THE5ERS_TOKEN: ${{ secrets.THE5ERS_TOKEN }}
          THE5ERS_REFRESH_TOKEN: ${{ secrets.THE5ERS_REFRESH_TOKEN }}
        run: |
          cd scraper
          touch .env
          echo "SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "THE5ERS_TOKEN=*** >> .env
          echo "THE5ERS_REFRESH_TOKEN=*** >> .env
          node fetch_data.mjs
