<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Táo Tầu Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Táo Tầu Journal" />
    <meta name="theme-color" content="#1a73e8" />
    <!-- Add error handler to show white screen of death errors -->
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; background: white; position: fixed; top: 0; left: 0; z-index: 9999; width: 100%; height: 100%;"><h1>Runtime Error</h1><pre>' + e.message + '\n' + e.filename + ':' + e.lineno + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; background: white; position: fixed; top: 0; left: 0; z-index: 9999; width: 100%; height: 100%;"><h1>Unhandled Promise Rejection</h1><pre>' + e.reason + '</pre></div>';
      });
    </script>
    <script src="/env.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
