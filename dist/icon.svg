<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <!-- Background Gradient for beautiful Quantum feel -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1f20" />
      <stop offset="100%" stop-color="#0e0f10" />
    </linearGradient>
    <!-- Cloud Blue Gradient -->
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d8cff" />
      <stop offset="100%" stop-color="#1557b0" />
    </linearGradient>
    <!-- Lightning Bolt Yellow Gradient -->
    <linearGradient id="lightning-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff176" />
      <stop offset="100%" stop-color="#f57f17" />
    </linearGradient>
    <!-- Inner Glow effect -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1a73e8" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect x="12" y="12" width="488" height="488" rx="100" fill="none" stroke="#2e2f30" stroke-width="4" />
  
  <!-- Cloud & Lightning Icon centered with high contrast -->
  <g filter="url(#glow)">
    <!-- Base Cloud background -->
    <path d="M180 340c-44 0-80-36-80-80 0-38 27-71 65-78C175 110 225 70 285 70c65 0 120 48 130 110 35 6 60 36 60 70 0 44-36 80-80 80h-20" fill="url(#cloud-grad)" opacity="0.9" />
    
    <!-- Lightning bolt sitting overlapping the cloud -->
    <path d="M305 150 L195 305 L265 305 L215 425 L345 265 L275 265 Z" fill="url(#lightning-grad)" stroke="#0e0f10" stroke-width="6" stroke-linejoin="round" />
  </g>
</svg>
